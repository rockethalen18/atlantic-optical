# ============================================
# GitHub Actions - Deploy a Banahosting
# ============================================
# Este workflow se ejecuta automáticamente cuando haces push a main
# y despliega los cambios a Banahosting via FTP

name: Deploy to Banahosting

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Permitir deploy manual desde GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: |
          npm run build
          npx next build

      - name: Deploy Frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /public_html
          local-dir: ./out
          delete-remote: true
          exclude: |
            .git*
            .github*
            node_modules*
            src*
            database*
            backend*
            *.md
            .env*

      - name: Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /public_html/backend
          local-dir: ./backend
          delete-remote: true
          exclude: |
            .git*
            uploads/*
            config/database.php

      - name: Deploy Database Schema
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /public_html/backend
          local-dir: ./database
          delete-remote: false
